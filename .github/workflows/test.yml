name: Pruebas Biblioteca

on:
    push:
        branches:
          - main
    pull_request:
        branches:
          - main

jobs:
    test:
        runs-on: ubuntu-latest

        services:
          mysql:
            image: mysql:8.0
            env:
              MYSQL_ROOT_PASSWORD: root
              MYSQL_DATABASE: biblioteca
            ports:
              - 3306:3306
            options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
            volumes:
              - ${{ github.workspace }}/biblioteca.sql:/docker-entrypoint-initdb.d/biblioteca.sql        
        steps:
          - name: Checkout code
            uses: actions/checkout@v2

          - name: Instalar cliente MySQL
            run: sudo apt-get update && sudo apt-get install -y mysql-client

          - name: Probar conexión con MySQL
            run: |
              mysql -h 127.0.0.1 -u root -proot -e "SHOW DATABASES"

          - name: Set up Python
            uses: actions/setup-python@v2
            with:
                python-version: '3.13'

          - name: Install dependencies
            run: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              cd services/usuarios

          - name: Run test
            run: |
              pytest
